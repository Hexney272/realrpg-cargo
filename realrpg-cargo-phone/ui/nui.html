<!DOCTYPE html>
<html>
<head><title>RealRPG Cargo Phone NUI Bridge</title></head>
<body style="margin:0;padding:0;background:transparent;pointer-events:none;width:0;height:0;overflow:hidden;">
<script>
// This invisible page receives SendNUIMessage from Lua
// and forwards it to the phone iframe via postMessage
window.addEventListener('message', function(event) {
    if (event.data && event.data.type) {
        // Forward to parent (qs-smartphone) which forwards to our iframe
        try {
            window.parent.postMessage(event.data, '*');
        } catch(e) {}
    }
});
</script>
</body>
</html>
